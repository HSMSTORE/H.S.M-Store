body { font-family: "Poppins", sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }

top: 0;
z-index: 1000;

.main-logo {
height: 70px;

.top-controls {

.categories {

gap: 8px;
overflow-x: auto;
white-space: nowrap;
padding-bottom: 5px;
}
.cat-btn { border: none; background: #eee; padding: 5px 12px; border-radius: 999px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
.cat-btn.active { background: var(--dark); color: #fff; }

.container { max-width: 1100px; margin: 0 auto; padding: 20px 15px; }
#detail-view { display: none; }

.marquee-container { background: #1a1a1a; padding: 12px 0; overflow: hidden; display: flex; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
.marquee-content { display: flex; animation: scroll 40s linear infinite; }
.marquee-item { display: flex; align-items: center; gap: 10px; background: #fff; margin: 0 10px; padding: 5px 15px; border-radius: 50px; white-space: nowrap; font-size: 0.8rem; font-weight: 600; }
.marquee-item img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

.products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
@media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

.product-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; position: relative; }
.product-card:hover { transform: translateY(-5px); }
.card-img-wrap { padding-top: 100%; position: relative; }
.card-img-wrap img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }

.card-body { padding: 15px 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; min-height: 120px; }
.card-title { font-size: 0.85rem; font-weight: 600; line-height: 1.4; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px;}

.price-stack { display: flex; flex-direction: column; align-items: center; margin-top: auto; }
.old-price { text-decoration: line-through; color: var(--red); font-size: 0.85rem; font-weight: bold; }
.card-price { color: var(--gold); font-weight: 600; font-size: 1.1rem; }

.sale-tag { position: absolute; top: 10px; right: 10px; background: var(--red); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; z-index: 5; }
.out-of-stock-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: rgba(0,0,0,0.8); color: white; padding: 5px 15px; border: 2px solid white; font-weight: bold; z-index: 10; }

.detail-layout {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 30px;
height: calc(100vh - 120px);
align-items: center;
}
@media (max-width: 768px) { .detail-layout { grid-template-columns: 1fr; } }

.slider-box { background: #fff; border-radius: 20px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
.slide-window { overflow: hidden; border-radius: 15px; position: relative; }
.slide-track { display: flex; transition: 0.4s ease-in-out; }
.slide-track img {
width: 100%;
flex-shrink: 0;
object-fit: contain;
max-height: 55vh;
background: #fff;
}

.slider-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
.nav-circle { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; }
.dots { display: flex; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.dot.active { background: var(--red); width: 16px; border-radius: 10px; }

.info-box { display: flex; flex-direction: column; gap: 15px; }
.detail-cat { font-size: 0.75rem; text-transform: uppercase; color: var(--red); font-weight: 600; background: #fff1f2; padding: 4px 12px; border-radius: 20px; width: fit-content; }
.detail-price-box { display: flex; align-items: baseline; gap: 10px; }

footer { text-align: center; padding: 40px; color: #888; font-size: 0.8rem; border-top: 1px solid #eee; background: #fff; margin-top: 40px; }

let products = rawProducts;
let activeCat = 'All';
let slideIdx = 0;
let currentPhotos = [];

function getOldPrice(p) {
return p.originalPrice;
}

function render() {
const term = document.getElementById('searchInput').value.toLowerCase();
const grid = document.getElementById('grid');
grid.innerHTML = '';
const filtered = products.filter(p => (activeCat === 'All' || p.category === activeCat) && p.name.toLowerCase().includes(term));
document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';

filtered.forEach(p => {
let imgSrc = p.image.includes('.') ? p.image : p.image + ".jpeg";
let saleHtml = p.sale ? `<div class="sale-tag">SALE</div>` : '';
let oosHtml = p.outOfStock ? `<div class="out-of-stock-label">OUT OF STOCK</div>` : '';
let priceHtml = p.sale ? `<div class="price-stack"><span class="old-price">${getOldPrice(p)} L.E</span><span class="card-price">${p.price} L.E</span></div>` : `<div class="card-price">${p.price} L.E</div>`;

grid.innerHTML += `
      <div class="product-card" onclick="showDetail('${p.id}')">
        ${saleHtml} ${oosHtml}
        <div class="card-img-wrap"><img src="${imgSrc}"></div>
        <div class="card-body"><div class="card-title">${p.name}</div>${priceHtml}</div>
      </div>`;
});
}

function showDetail(id) {
const p = products.find(i => i.id === id);
document.getElementById('mainHeader').style.display = 'none';
document.getElementById('gallery-view').style.display = 'none';
document.getElementById('detail-view').style.display = 'block';

document.getElementById('d-title').innerText = p.name;
document.getElementById('d-cat').innerText = p.category;
document.getElementById('d-desc').innerText = p.desc;

const pBox = document.getElementById('d-price-container');
pBox.innerHTML = p.sale 
? `<span class="detail-old-price" style="text-decoration: line-through; color: gray; margin-right: 10px;">${p.originalPrice} L.E</span><span class="detail-price" style="color: red; font-weight: bold;">${p.price} L.E</span>` 
: `<span class="detail-price">${p.price} L.E</span>`;

const wa = document.getElementById('d-wa');
if(p.outOfStock) {
wa.innerText = "Out of Stock"; 
wa.classList.add('disabled');
} else {
const msg = p.sale
? `✨ *H.S.M Store Order*

🛍️ Product: ${p.name}

🔥 Discount Price: ${p.price} L.E
💰 Original Price: ${p.originalPrice} L.E

Please confirm availability. Thank you!`
: `✨ *H.S.M Store Order*

🛍️ Product: ${p.name}

💰 Price: ${p.price} L.E

Please confirm availability. Thank you!`;
const phoneNumber = "201020730112";
wa.href = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`;
wa.innerText = "🟢 Order via WhatsApp"; 
wa.classList.remove('disabled');
}

const mainImg = p.image.includes('.') ? p.image : p.image + ".jpeg";
currentPhotos = [mainImg, ...(p.extraImages || []).map(img => img.includes('.') ? img : img + ".jpeg")];
slideIdx = 0; 
updateSlider(); 
window.scrollTo(0,0);
}

function showGallery() {
document.getElementById('mainHeader').style.display = 'flex';
document.getElementById('gallery-view').style.display = 'block';
document.getElementById('detail-view').style.display = 'none';
}

function updateSlider() {
const track = document.getElementById('track'), dots = document.getElementById('dots');
track.innerHTML = currentPhotos.map(img => `<img src="${img}">`).join('');
dots.innerHTML = currentPhotos.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
track.style.transform = `translateX(0%)`;
}

function nextSlide() { if(currentPhotos.length > 1) { slideIdx = (slideIdx + 1) % currentPhotos.length; move(); } }
function prevSlide() { if(currentPhotos.length > 1) { slideIdx = (slideIdx - 1 + currentPhotos.length) % currentPhotos.length; move(); } }
function move() {
document.getElementById('track').style.transform = `translateX(-${slideIdx * 100}%)`;
document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === slideIdx));
}

function setCat(cat, btn) {
activeCat = cat;
document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active'); render();
}

const music = document.getElementById('bgMusic');

function updateMusicButton() {
document.getElementById('musicBtn').innerText = music.paused ? '🔇' : '🔊';
}

function startMusic() {
music.play().then(() => {
updateMusicButton();
}).catch(() => {});
}

function tryAutoPlayMusic() {
startMusic();
}

function enableMusicOnFirstInteraction() {
startMusic();
window.removeEventListener('click', enableMusicOnFirstInteraction);
window.removeEventListener('scroll', enableMusicOnFirstInteraction);
window.removeEventListener('touchstart', enableMusicOnFirstInteraction);
window.removeEventListener('keydown', enableMusicOnFirstInteraction);
}

function toggleMusic() {
if(music.paused) {
music.play().then(() => {
updateMusicButton();
}).catch(() => {});
}
else {
music.pause();
updateMusicButton();
}
}

window.addEventListener('load', tryAutoPlayMusic);
window.addEventListener('click', enableMusicOnFirstInteraction, { passive: true });
window.addEventListener('scroll', enableMusicOnFirstInteraction, { passive: true });
window.addEventListener('touchstart', enableMusicOnFirstInteraction, { passive: true });
window.addEventListener('keydown', enableMusicOnFirstInteraction);
music.addEventListener('play', updateMusicButton);
music.addEventListener('pause', updateMusicButton);

let lastScrollY = window.scrollY;
window.addEventListener("scroll", () => {
const header = document.getElementById("mainHeader");
if (window.scrollY > lastScrollY && window.scrollY > 150) header.classList.add("hide-header");
else header.classList.remove("hide-header");
lastScrollY = window.scrollY;
});

const mq = document.getElementById('marquee');
const mItems = products.slice(0,12).map(p => `<div class="marquee-item"><img src="${p.image.includes('.')?p.image:p.image+'.jpeg'}"><span>${p.name}</span></div>`).join('');
mq.innerHTML = mItems + mItems;

render();
updateMusicButton();

const box = document.getElementById("discountProducts");

const saleProducts = products.filter(p=>p.sale);

box.innerHTML = saleProducts.map(p=>{

return `

</span>

${p.price} L.E
</span>
</div>

</div>

</div>
`;

function closeDiscountPopup(){
document.getElementById("discountPopup").style.display="none";
}

function openDiscountProduct(id){

showDetail(id);

}

window.addEventListener("load",()=>{
